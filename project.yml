name: PlainControl
options:
  bundleIdPrefix: com.ismartcoding.plain
  deploymentTarget:
    iOS: "14.0"
  generateSchemas: true
targets:
  PlainControl:
    type: application
    platform: iOS
    deploymentTarget: "14.0"
    sources: [PlainControl]
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WebKit.framework
      - sdk: Foundation.framework
    info:
      path: PlainControl/Info.plist
    settings:
      base:
        INFOPLIST_FILE: PlainControl/Info.plist
        GENERATE_INFOPLIST_FILE: false
        PRODUCT_BUNDLE_IDENTIFIER: com.ismartcoding.plain.control
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
