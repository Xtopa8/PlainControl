name: PlainControl
options:
  bundleIdPrefix: com.ismartcoding.plain
  deploymentTarget:
    iOS: "14.0"
  generateSchemas: true
targets:
  PlainControl:
    type: application
    platform: iOS
    deploymentTarget: "14.0"
    sources: [PlainControl]
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: WebKit.framework
      - sdk: Foundation.framework
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.ismartcoding.plain.control
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Used to connect to PlainApp devices on LAN"
        INFOPLIST_KEY_CFBundleDisplayName: PlainControl
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen: ""
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
