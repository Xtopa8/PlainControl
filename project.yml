name: PlainControl
options:
  bundleIdPrefix: com.ismartcoding.plain
  deploymentTarget:
    iOS: "17.0"
  generateSchemas: true

targets:
  PlainControl:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - PlainControl
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: SwiftData.framework
      - sdk: Foundation.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ismartcoding.plain.control
        INFOPLIST_FILE: PlainControl/Info.plist
        GENERATE_INFOPLIST_FILE: false
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
