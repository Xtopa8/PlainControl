name: Build IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build PlainControl IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild build \
            -project PlainControl.xcodeproj \
            -scheme PlainControl \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath DerivedData \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO

      - name: Package IPA
        run: |
          APP_PATH=$(find DerivedData/Build/Products -name "PlainControl.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find PlainControl.app"
            find DerivedData -name "*.app" -type d 2>/dev/null
            exit 1
          fi
          echo "Found: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr PlainControl.ipa Payload/
          ls -lh PlainControl.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PlainControl.ipa
          path: PlainControl.ipa
          retention-days: 30
