name: Build IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions: write-all

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build -project PlainControl.xcodeproj -scheme PlainControl \
            -sdk iphoneos -destination "generic/platform=iOS" \
            -configuration Release -derivedDataPath DerivedData \
            -arch arm64 ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGNING_REQUIRED=YES

      - name: Package
        run: |
          APP=$(find DerivedData -name "PlainControl.app" -type d | head -1)
          echo "App: $APP"
          ls -la "$APP/PlainControl" 2>/dev/null && file "$APP/PlainControl" 2>/dev/null
          mkdir Payload && cp -R "$APP" Payload/ && zip -qr PlainControl.ipa Payload/

      - uses: actions/upload-artifact@v4
        with:
          name: PlainControl.ipa
          path: PlainControl.ipa
          retention-days: 30

      - uses: softprops/action-gh-release@v2
        with:
          name: Latest Build
          tag_name: latest
          files: PlainControl.ipa
          prerelease: true
          make_latest: true
