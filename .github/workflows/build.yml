name: Build IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build PlainControl IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: List project files
        run: ls -la PlainControl/ && echo "---" && find . -name "*.swift" | sort

      - name: Build IPA
        run: |
          set -o pipefail
          xcodebuild build \
            -project PlainControl.xcodeproj \
            -scheme PlainControl \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee build.log
        continue-on-error: true

      - name: Show build errors (if any)
        if: failure()
        run: |
          echo "=== BUILD ERRORS ==="
          grep -E "error:|✖|BUILD FAILED" build.log || echo "No specific error found"
          echo "=== LAST 100 LINES ==="
          tail -100 build.log

      - name: Package as IPA
        if: success()
        run: |
          APP_PATH=$(find /Users/runner/Library/Developer/Xcode/DerivedData -name "PlainControl.app" -path "*/Release-iphoneos/*" 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -name "PlainControl.app" 2>/dev/null | head -1)
          fi
          echo "APP_PATH=$APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/ 2>/dev/null || cp -R build/Release-iphoneos/PlainControl.app Payload/ 2>/dev/null
          zip -qr PlainControl.ipa Payload/
          ls -la PlainControl.ipa

      - name: Upload IPA Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PlainControl.ipa
          path: PlainControl.ipa
          retention-days: 30
