name: Build IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions: write-all

jobs:
  build:
    name: Build
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build -project PlainControl.xcodeproj -scheme PlainControl \
            -sdk iphoneos -destination "generic/platform=iOS" \
            -configuration Release -derivedDataPath DerivedData \
            CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" ONLY_ACTIVE_ARCH=NO

      - name: Package IPA
        run: |
          APP=$(find DerivedData -name "PlainControl.app" -type d | head -1)
          mkdir Payload && cp -R "$APP" Payload/ && zip -qr PlainControl.ipa Payload/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlainControl.ipa
          path: PlainControl.ipa
          retention-days: 30

      - name: Update Release
        uses: softprops/action-gh-release@v2
        with:
          name: Latest Build
          tag_name: latest
          body: Auto-built from latest master commit.
          files: PlainControl.ipa
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
