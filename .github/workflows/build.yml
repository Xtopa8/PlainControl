name: Build IPA

permissions: write-all

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build PlainControl IPA
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build App
        id: build
        run: |
          xcodebuild build \
            -project PlainControl.xcodeproj \
            -scheme PlainControl \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -derivedDataPath DerivedData \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tee xcodebuild.log
          exit ${PIPESTATUS[0]}

      - name: Show Errors
        if: failure()
        run: |
          echo "=== COMPILATION ERRORS ==="
          grep -E "error:" xcodebuild.log | head -30 || true
          echo "=== WARNINGS ==="
          grep -E "warning:" xcodebuild.log | head -20 || true
          echo "=== BUILD FAILED LINE ==="
          grep -E "BUILD FAILED" xcodebuild.log || true
          echo "=== LAST 30 LINES ==="
          tail -30 xcodebuild.log

      - name: Package IPA
        if: success()
        run: |
          APP_PATH=$(find DerivedData/Build/Products -name "PlainControl.app" -type d 2>/dev/null | head -1)
          echo "Found: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr PlainControl.ipa Payload/
          ls -lh PlainControl.ipa

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PlainControl.ipa
          path: PlainControl.ipa
          retention-days: 30

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: xcodebuild.log
          retention-days: 7

      - uses: softprops/action-gh-release@v2
        if: success()
        with:
          name: Latest Build
          tag_name: latest
          files: PlainControl.ipa
          prerelease: true
          make_latest: true
