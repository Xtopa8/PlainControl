name: Build IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build PlainControl IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build IPA (unsigned for sideloading)
        run: |
          xcodebuild -project PlainControl.xcodeproj \
            -scheme PlainControl \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            build \
            CONFIGURATION_BUILD_DIR="${{ github.workspace }}/build"

      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -R build/PlainControl.app Payload/
          zip -qr PlainControl.ipa Payload/
          rm -rf Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlainControl.ipa
          path: PlainControl.ipa
          retention-days: 30
